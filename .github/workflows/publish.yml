name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for OIDC trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore RagEvalNet/RagEvalNet.sln

      - name: Build
        run: dotnet build RagEvalNet/RagEvalNet.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test RagEvalNet/RagEvalNet.sln --no-build --configuration Release --verbosity normal

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Pack
        run: dotnet pack RagEvalNet/src/RagEval/RagEval.csproj --no-build --configuration Release -p:PackageVersion=${{ steps.version.outputs.VERSION }} --output ./nupkg

      - name: NuGet login (OIDC → temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: hpkhariprasad   # nuget.org profile name, NOT email

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
